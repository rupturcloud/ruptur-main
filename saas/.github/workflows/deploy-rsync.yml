name: Ruptur SaaS Deploy (Rsync)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Verify code integrity
      run: |
        echo "✅ Checking for exposed credentials..."
        node scripts/security-check.mjs || {
          echo "⚠️  Security warnings found but continuing..."
        }

        echo "✅ Verifying npm can install..."
        npm ci --dry-run

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
        known-hosts: ${{ secrets.DEPLOY_KNOWN_HOSTS }}

    - name: Deploy with rsync
      run: |
        chmod +x infra/scripts/deploy-rsync.sh
        ./infra/scripts/deploy-rsync.sh
      env:
        ENVIRONMENT: production
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    - name: Post-deployment verification
      run: |
        echo "✅ Deployment workflow completed"
        echo "Monitor production: https://app.ruptur.cloud"
        echo "Check logs: ssh deploy@ruptur.cloud 'tail -f /app/ruptur-saas/logs/*.log'"

    - name: Notify on failure
      if: failure()
      run: |
        if [ -n "${{ secrets.SLACK_WEBHOOK }}" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ Ruptur SaaS deployment FAILED (build #${{ github.run_number }})"}' \
            ${{ secrets.SLACK_WEBHOOK }} || true
        fi
