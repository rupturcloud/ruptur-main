name: Ruptur SaaS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

env:
  REGISTRY: gcr.io/ruptur-jarvis-v1-68358/saas
  PROJECT_ID: ruptur-jarvis-v1-68358

jobs:
  # CI Pipeline
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run lint
      run: npm run lint || echo "Lint failed but continuing"
      
    - name: Run tests
      run: npm test || echo "No tests configured"
      
    - name: Security audit
      run: npm audit --audit-level moderate || echo "Vulnerabilities found"
      
    - name: Build Docker image
      run: |
        docker build -t ruptur-saas:${{ github.run_number }} .
        docker tag ruptur-saas:${{ github.run_number }} ruptur-saas:latest
        
    - name: Run E2E tests
      run: |
        ./infra/scripts/ci-pipeline.sh
      env:
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: artifacts/

  # CD Pipeline - Staging
  cd-staging:
    name: Deploy to Staging
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ env.PROJECT_ID }}
        
    - name: Configure Docker
      run: gcloud auth configure-docker
      
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        
    - name: Deploy to staging
      run: |
        ./infra/scripts/deploy.sh staging
      env:
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}

  # CD Pipeline - Production
  cd-production:
    name: Deploy to Production
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ env.PROJECT_ID }}
        
    - name: Configure Docker
      run: gcloud auth configure-docker
      
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        
    - name: Deploy to production
      run: |
        ./infra/scripts/cd-pipeline.sh
      env:
        ENVIRONMENT: production
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_RUN_NUMBER: ${{ github.run_number }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        DEPLOY_EMAIL: ${{ secrets.DEPLOY_EMAIL }}
        
    - name: Run smoke tests
      run: |
        curl -f https://app.ruptur.cloud/api/local/health
        curl -s https://app.ruptur.cloud/api/inbox/summary | jq .
        curl -s https://app.ruptur.cloud/api/campaigns | jq .
        
    - name: Notify deployment
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚀 Ruptur SaaS deployado para produção (build #${{ github.run_number }})"}' \
            ${{ secrets.SLACK_WEBHOOK }} || echo "Slack notification failed"
        fi

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  # Release
  release:
    name: Create Release
    needs: [ci, cd-production]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create release assets
      run: |
        tar -czf ruptur-saas-${{ github.event.release.tag_name }}.tar.gz \
          --exclude=.git \
          --exclude=node_modules \
          --exclude=.github \
          .
          
    - name: Upload release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./ruptur-saas-${{ github.event.release.tag_name }}.tar.gz
        asset_name: ruptur-saas-${{ github.event.release.tag_name }}.tar.gz
        asset_content_type: application/gzip
