# Ruptur Cloud - Nginx
#
# Estratégia SaaS:
# - ruptur.cloud / www.ruptur.cloud: página pública de vendas
# - app.ruptur.cloud / saas.ruptur.cloud: aplicação logada

server {
    listen 80;
    server_name ruptur.cloud www.ruptur.cloud;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location = /login {
        return 301 https://app.ruptur.cloud/login;
    }

    location = /signup {
        return 301 https://app.ruptur.cloud/signup;
    }

    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /warmup/ {
        proxy_pass http://localhost:4173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        alias /opt/ruptur/saas/web/dist-client/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /client-area/ {
        alias /opt/ruptur/saas/web/dist-client/;
        try_files $uri $uri/ /client-area/index.html;
    }

    location / {
        root /opt/ruptur/saas/web/dist-client;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name app.ruptur.cloud saas.ruptur.cloud;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /warmup/ {
        proxy_pass http://localhost:4173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rotas SPA da aplicação logada/public auth no subdomínio app.
    location ~ ^/(login|signup|onboarding|dashboard|campanhas|carteira|inbox|admin)$ {
        root /opt/ruptur/saas/web/dist-client;
        try_files /index.html =404;
    }

    location /client-area/ {
        alias /opt/ruptur/saas/web/dist-client/;
        try_files $uri $uri/ /client-area/index.html;
    }

    location /dashboard/ {
        alias /opt/ruptur/saas/web/dashboard-dist/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location /manager/ {
        alias /opt/ruptur/saas/web/manager-dist/;
        try_files $uri $uri/ /manager/index.html;
    }

    location /assets/ {
        alias /opt/ruptur/saas/web/dist-client/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        return 301 https://app.ruptur.cloud/client-area/;
    }
}
