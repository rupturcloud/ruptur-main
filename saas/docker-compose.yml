services:
  saas-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - ruptur-edge
    labels:
      traefik.enable: "true"
      traefik.docker.network: "ruptur-edge"
      traefik.http.routers.saas-web-http.entrypoints: web
      traefik.http.routers.saas-web-http.rule: "Host(`saas.ruptur.cloud`)"
      traefik.http.routers.saas-web.entrypoints: websecure
      traefik.http.routers.saas-web.rule: "Host(`saas.ruptur.cloud`)"
      traefik.http.routers.saas-web.tls.certresolver: letsencrypt
      traefik.http.services.saas-web.loadbalancer.server.port: "3001"

networks:
  ruptur-edge:
    external: true
